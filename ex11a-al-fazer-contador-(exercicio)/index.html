<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Temporizador -->
  <div id="timer">0</div>

  <!-- Botões de controle -->
  <button id="startButton">Iniciar</button>
  <button id="pauseButton">Pausar</button>
  <button id="resetButton">Resetar</button>

  <!-- Script JavaScript embutido na página -->
  <script>
    const Iniciar = document.getElementById('startButton');
    const Pausar = document.getElementById('pauseButton');
    const Resetar = document.getElementById('resetButton');
    const tempo = document.getElementById('timer');

    let timer = 0;
    let intervalo 

    // Iniciar
    Iniciar.addEventListener('click', () => {
    intervalo = setInterval(function() {
    timer++
    tempo.textContent = timer
  }, 1000)
})

    Pausar.addEventListener('click', () => {
      clearInterval(intervalo)
  });

    Resetar.addEventListener('click', () => {
      clearInterval(intervalo)
      timer = 0
      tempo.textContent = 0
  })

  </script>
</body>
</html>
